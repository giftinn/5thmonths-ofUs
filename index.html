<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:'Inter',sans-serif;
background:#f7e4d7;
height:100vh;
overflow:hidden;
}

#app{
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

.card{
position:absolute;
width:90%;
max-width:420px;
max-height:90vh;
overflow:auto;
background:#ffffff;
border-radius:26px;
padding:40px 32px;
text-align:center;
box-shadow:0 25px 60px rgba(84,17,15,.35);
opacity:0;
transform:scale(.94) translateY(40px);
transition:.7s cubic-bezier(.19,1,.22,1);
pointer-events:none;
}

.card::-webkit-scrollbar{width:6px}
.card::-webkit-scrollbar-thumb{background:#54110f;border-radius:10px}

.card.active{
opacity:1;
transform:scale(1) translateY(0);
pointer-events:auto;
}

h1,h2{
font-family:'DM Serif Display',serif;
margin:0 0 14px;
color:#54110f;
}

p{
font-size:18px;
line-height:1.7;
opacity:.9;
color:#30160f;
}

button{
padding:12px 26px;
border:none;
border-radius:999px;
background:#54110f;
cursor:pointer;
margin-top:18px;
font-size:15px;
transition:.25s;
color:#ffffff;
}

button:hover{
transform:scale(1.05);
background:#30160f;
box-shadow:0 10px 25px rgba(84,17,15,.6);
}

/* PIN */
.pin-display{
display:flex;
justify-content:center;
gap:12px;
margin:25px 0;
}

.dot{
width:18px;
height:18px;
border-radius:50%;
border:2px solid #54110f;
}

.dot.fill{background:#54110f}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.keypad button{
padding:16px;
font-size:18px;
border-radius:14px;
}

/* GAME */
#options{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

#options button{
background:#f7e4d7;
border:1px solid #54110f;
color:#30160f;
}

.score-box{
margin-top:22px;
font-size:15px;
letter-spacing:.5px;
color:#54110f;
}

#feedback{
margin-top:14px;
min-height:22px;
font-size:14px;
transition:.3s;
color:#54110f;
}

/* CORRECT */
.correctAnim{
animation:pop .4s ease;
background:#C8F2DD !important;
border-color:#2FAF6B !important;
color:#145A32 !important;
}

/* WRONG */
.wrongAnim{
animation:shake .4s;
background:#FFD6DA !important;
border-color:#E63946 !important;
color:#6A1B1F !important;
}

/* TIMER */
.lovebox{
background:linear-gradient(145deg,#ffffff,#f7e4d7);
border-radius:22px;
padding:20px;
margin-bottom:25px;
box-shadow:0 10px 30px rgba(84,17,15,.35);
border:1px solid rgba(84,17,15,.25);
}

.timer-title{
font-size:12px;
letter-spacing:2px;
opacity:.7;
color:#54110f;
}

.timer-display{
font-family:'DM Serif Display',serif;
font-size:28px;
margin-top:8px;
color:#30160f;
letter-spacing:1px;
animation:pulse 2.5s infinite;
}

@keyframes pulse{50%{opacity:.5}}

/* MEDIA */
.reveal-box{
margin:20px 0;
aspect-ratio:16/9;
display:flex;
align-items:center;
justify-content:center;
border-radius:20px;
border:2px dashed #54110f;
cursor:pointer;
background:#f7e4d7;
transition:.3s;
}

.reveal-box:hover{transform:scale(1.02)}

/* LETTER FINAL */
.letter{
margin-top:22px;
font-family:'Cormorant Garamond',serif;
font-size:18px;
line-height:1.3;
letter-spacing:.4px;
text-align:left;
color:#30160f;
opacity:.95;
min-height:100px;
animation:fadeInText 1.2s ease;
white-space: pre-line;
}

.signature{
margin-top:32px;
text-align:right;
font-family:'Playfair Display',serif;
font-size:20px;
letter-spacing:1px;
color:#54110f;
animation:fadeInText 1.8s ease;
}

@keyframes fadeInText{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* HEART BACKGROUND */
canvas{
position:fixed;
inset:0;
z-index:-1;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="confettiCanvas"></canvas>

<audio id="bgm" src="song.mp3" loop></audio>
  
<div id="app">

<!-- welcome -->
<section class="card active">
<h1>Happy 5th Monthversary!</h1>
<p>here’s a little gift to appreciate our journey</p>
<button onclick="next()">Unlock</button>
</section>

<!-- pin -->
<section class="card">
<h2>Enter the code 🔐</h2>
<div class="pin-display" id="pin"></div>

<div class="keypad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="clearPin()">⌫</button>
<button onclick="press(0)">0</button>
<button onclick="checkPin()">✔</button>
</div>
</section>

<!-- quiz -->
<section class="card">
<h2 id="question">Little game 🎮</h2>
<p>Answer correctly to earn points</p>
<div id="options"></div>

<div class="score-box">
Points: <span id="score">0</span> / 10
</div>

<p id="feedback"></p>
</section>

<!-- final -->
<section class="card">

<h1>Eternally Yours, San.</h1>

<div class="lovebox">
<div class="timer-title">TIME WITH YOU</div>
<div id="loveTimer" class="timer-display">loading...</div>
</div>

<div class="reveal-box" onclick="revealMemory(this)">
Tap to reveal our memory
</div>

<div id="letter" class="letter"></div>
<div id="sign" class="signature"></div>

</section>

</div>

<script>

/* =================================================
   SLIDE NAVIGATION
================================================= */

const cards=document.querySelectorAll('.card');
let page=0;
const music=document.getElementById("bgm");
music.volume=0.4;
let musicStarted=false;

function show(){
cards.forEach(c=>c.classList.remove('active'));
cards[page].classList.add('active');
if(page===3)startTimer();
}

function next(){
page++;

if(page===1 && !musicStarted){
music.play();
musicStarted=true;
}

show();
if(page===2)loadQuestion();
}



/* =================================================
   PIN SYSTEM
================================================= */

let pinInput = '';
const correctPin = '0611';
const pinDisplay = document.getElementById("pin");

function renderDots(){
    pinDisplay.innerHTML = '';

    for(let i=0;i<4;i++){
        const d = document.createElement("div");
        d.className = "dot" + (i < pinInput.length ? " fill" : "");
        pinDisplay.appendChild(d);
    }
}

renderDots();

function press(n){
    if(pinInput.length < 4){
        pinInput += n;
        renderDots();
    }
}

function clearPin(){
    pinInput = pinInput.slice(0,-1);
    renderDots();
}

function checkPin(){
    if(pinInput === correctPin){
        next();
    }else{
        pinDisplay.classList.add('shake');

        setTimeout(()=>{
            pinDisplay.classList.remove('shake');
        },400);

        pinInput = '';
        renderDots();
    }
}


/* =================================================
   QUIZ SYSTEM
================================================= */

const questions=[
{q:"When did we start dating?", options:["September","October","November"],correct:2},
{q:"Who loves harder?", options:["You","Me","Both"],correct:2},
{q:"What usually we do to spend time together?", options:["Watching movie","Listening to music","Playing games"],correct:0},
{q:"What do i do when i miss you?", options:["Keep it by myself","Text you","Igonore you"],correct:1},
{q:"Who made the first move?", options:["You',"Me","No one"],correct:1},
{q:"What do we call each other?", options:["Baby","Babe","Sawit"],correct:2},
{q:"Who gets jealous more easily?", options:["You","Me","Both"],correct:2},
{q:"How did you feel when we first got together?", options:["Happy","Sad","Angry"],correct:0},
{q:"Which character do we both love?", options:["daredevil","Spider-Man","Hulk"],correct:1},
{q:"One word to describe us?", options:["Enemies","Strangers","Soulmates"],correct:2}
];

let currentQ = 0;
let score = 0;

const scoreEl = document.getElementById("score");
const question = document.getElementById("question");
const options = document.getElementById("options");
const feedback = document.getElementById("feedback");


function loadQuestion(){

    const q = questions[currentQ];

    question.textContent = q.q;
    options.innerHTML = "";
    feedback.textContent = "";

    q.options.forEach((opt,i)=>{
        const b = document.createElement("button");
        b.textContent = opt;
        b.onclick = () => checkAnswer(i,b);
        options.appendChild(b);
    });
}


function checkAnswer(i,btn){

    const q = questions[currentQ];

    if(i === q.correct){

        score++;
        scoreEl.textContent = score;

        btn.classList.add("correctAnim");
        feedback.textContent = "Correct🤍";

        setTimeout(()=>{
            currentQ++;

            if(currentQ < questions.length){
                loadQuestion();
            }else{
                next();
            }
        },900);

    }else{

        btn.classList.add("wrongAnim");
        feedback.textContent = "Oh no, Try again!";
    }
}


/* =================================================
   RELATIONSHIP TIMER
================================================= */

function startTimer(){

    const start = new Date("2025-11-06T00:00:00");

    setInterval(()=>{

        const diff = new Date() - start;

        const d = Math.floor(diff / 86400000);
        const h = Math.floor(diff / 3600000) % 24;
        const m = Math.floor(diff / 60000) % 60;
        const s = Math.floor(diff / 1000) % 60;

        loveTimer.textContent = `${d} days ${h}h ${m}m ${s}s`;

    },1000);
}


/* =================================================
   MEMORY REVEAL + TYPING LETTER
================================================= */

let alreadyRevealed = false;

function revealMemory(el){

    if(alreadyRevealed) return;
    alreadyRevealed = true;

    el.innerHTML = `
        <img src="pict.jpg"
        style="width:100%;height:100%;object-fit:cover;border-radius:18px">
    `;

    const text = `
    Hi! You’ve successfully passed every question. And yep, today marks the fifth moon of our togetherness, a milestone luminous. Happy monthversary, my love. 

    One hundred and fifty one days have woven themselves into the tapestry of us, and I stand here awaiting the hundreds, thousands, even millions of days yet to unfold. Every moment becomes hallowed when you dwell within it. A smile blooms across my face whenever I recall the seconds and minutes we’ve shared. You are the architect of beauty in my life and the one who renders existence itself worthy. You were born bearing light and bringing joy to every soul fortunate enough to know you. I vow you, to be the one who endeavors ceaselessly to give you all that your heart could ever long for.
    
    You suffuse every corner of my being, as within my heart and the depths of my subconscious, there exists only you. I have loved you always, and I shall love you evermore. I will love you from here and from anywhere I am. Time will pass, but this love will remain. And my hope, we may walk together in joy and togetherness, forever and beyond. 
 `;

    const paragraphs = text.split("\n\n");

    const letter = document.getElementById("letter");
    const sign = document.getElementById("sign");

    if(!letter || !sign) return console.error("Letter or Sign element missing");

    let p=0;
    let i=0;

    function typeParagraph(){

        if(p>=paragraphs.length){
            sign.innerHTML="Yours n always<br> Haven";
            return;
        }

        const para=document.createElement("p");
        letter.appendChild(para);

        const typing=setInterval(()=>{
            para.innerHTML+=paragraphs[p].charAt(i);
            i++;

            if(i>=paragraphs[p].length){
                clearInterval(typing);
                p++;
                i=0;
                setTimeout(typeParagraph,350);
            }

        },30);
    }

    typeParagraph();
}


/* =================================================
   FLOATING HEARTS BACKGROUND
================================================= */

const canvas=document.getElementById("confettiCanvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

const colors=[
"rgba(84,17,15,0.35)",   // #54110f
"rgba(48,22,15,0.35)",   // #30160f
"rgba(247,228,215,0.35)" // #f7e4d7
];

let hearts=[];
for(let i=0;i<140;i++){
hearts.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
s:Math.random()*6+2,
v:Math.random()*0.6+0.2,
c:colors[Math.floor(Math.random()*colors.length)]
});
}

function heart(x,y,s){
ctx.beginPath();
ctx.moveTo(x,y);
ctx.bezierCurveTo(x,y-s,x-s,y-s,x-s,y);
ctx.bezierCurveTo(x-s,y+s,x,y+s*1.4,x,y+s*1.8);
ctx.bezierCurveTo(x,y+s*1.4,x+s,y+s,x+s,y);
ctx.bezierCurveTo(x+s,y-s,x,y-s,x,y);
ctx.fill();
}

function anim(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.shadowColor="rgba(84,17,15,0.5)";
ctx.shadowBlur=10;

hearts.forEach(h=>{
ctx.fillStyle=h.c;
heart(h.x,h.y,h.s);
h.y+=h.v;
if(h.y>canvas.height){
h.y=-90;
h.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(anim);
}
anim();

</script>

</body>
</html>
